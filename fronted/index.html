<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/index.css" />

    <title>Мониторинг дефектов</title>
  </head>
  <body>
    <!-- Шапка -->
    <header class="header">
      <div class="header__container">
        <!-- Название системы слева -->
        <div class="header__logo-block">
          <img src="images/logo.svg" alt="Логотип" class="header__logo" />
          <div class="header__logo-text">
            Система мониторинга<br />дефектов конвейерных лент
          </div>
        </div>

        <div class="header__nav">
          <!-- Кнопка уведомлений -->
          <a href="#" class="header__notifications">
            <div class="header__icon-wrapper">
              <img
                src="images/bell-icon.svg"
                alt="Уведомления"
                class="header__icon"
              />
              <span class="header__badge">+1</span>
            </div>
          </a>

          <!-- Кнопка Статистика -->
          <a
            href="pages/statistics.html"
            class="header__button header__button--statistics"
          >
            <img
              src="images/statistics-icon.svg"
              alt=""
              class="header__button-icon"
            />
            <span class="header__button-text">Статистика</span>
          </a>

          <!-- Кнопка Дефекты -->
          <a href="pages/defects.html" class="header__button header__button--defects">
            <img
              src="images/defects-icon.svg"
              alt=""
              class="header__button-icon"
            />
            <span class="header__button-text">Дефекты</span>
          </a>
        </div>
      </div>
    </header>

    <!-- Основной контент -->
    <main class="main">
      <!-- Видеопоток -->
      <div class="video-frame">
        <div class="camera-frame"></div>
      </div>

      <!-- Статистика за 24 часа -->
      <div class="stats-frame">
        <!-- Верхняя строка -->
        <div class="stats-header">
          <h2 class="stats-header__title">Статистика за 24 часа</h2>
          <!-- Блок с датой -->
          <a href="#" class="stats-header__date-wrapper">
            <!-- Иконка календаря -->
            <img
              src="images/calendar-icon.svg"
              alt="Календарь"
              class="stats-header__date-icon"
            />
            <!-- Дата -->
            <span class="stats-header__date-text">01.01.2026</span>
          </a>
        </div>

        <!-- Здесь будут карточки статистики -->
        <div class="stats-grid">

          <!-- Всего дефектов -->
    <div class="stat-card stat-card--total">
      <span class="stat-card__value">24</span>
      <span class="stat-card__label">Всего дефектов</span>
    </div>
    
    <!-- Трещины -->
    <div class="stat-card stat-card--cracks">
      <span class="stat-card__value">8</span>
      <span class="stat-card__label">Трещины</span>
    </div>
    
    <!-- Отслоения -->
    <div class="stat-card stat-card--delamination">
      <span class="stat-card__value">5</span>
      <span class="stat-card__label">Отслоения</span>
    </div>
    
    <!-- Заклепки -->
    <div class="stat-card stat-card--rivets">
      <span class="stat-card__value">11</span>
      <span class="stat-card__label">Заклепки</span>
    </div>
        </div>
        
      </div>
    </main>
    <!-- ОКНО УВЕДОМЛЕНИЙ -->
    <div class="notifications-overlay" id="notificationsPanel">
      <div class="notifications-app">
        <div class="notifications-header">
          <div class="bell">
            <img src="../images/bell-icon.svg" alt="Bell" class="icon" />
            <span class="badge">+1</span>
          </div>

          <h1>Новые дефекты</h1>

          <a href="#" class="clear">Очистить все</a>
        </div>

        <div class="list">
          <div class="card">
            <div class="left">
              <div class="id">D-015</div>
              <div class="date">01.01.2026 <span>14:30:12</span></div>
            </div>

            <div class="center">
              <div class="status">Критичный</div>
              <div class="type">Отслоение</div>
            </div>

            <div class="arrow">
              <img src="../images/arrow.svg" alt="arrow" class="icon" />
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="pages/js/notifications.js"></script>
  </body>
</html>
