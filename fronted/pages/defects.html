<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/main.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- Шапка -->
    <header class="header">
      <div class="header__container">
        <!-- Название системы слева -->
        <div class="header__logo-block">
          <img src="../images/logo.svg" alt="Логотип" class="header__logo" />
          <div class="header__logo-text">
            Система мониторинга<br />дефектов конвейерных лент
          </div>
        </div>

        <div class="header__nav">
          <!-- Кнопка уведомлений -->
          <a href="#" class="header__notifications">
            <div class="header__icon-wrapper">
              <img
                src="../images/bell-icon.svg"
                alt="Уведомления"
                class="header__icon"
              />
              <span class="header__badge">+1</span>
            </div>
          </a>
          <!-- Кнопка Статистика -->
          <a href="statistics.html" class="header__button header__button--statistics">
            <img
              src="../images/statistics-icon.svg"
              alt=""
              class="header__button-icon"
            />
            <span class="header__button-text">Статистика</span>
          </a>

          <!-- Кнопка Главная -->
          <a href="../index.html" class="header__button header__button--home-after">
            <img
              src="../images/home-icon.svg"
              alt=""
              class="header__button-icon"
            />
            <span class="header__button-text">Главная</span>
          </a>
        </div>
      </div>
    </header>
  </body>
</html>
